version: '3.8'

services:
  ro-production-dashboard:
    build: .
    container_name: ro-dashboard
    ports:
      - "8501:8501"
    environment:
      # Override via .env file or here. For secrets, prefer docker secrets or mounted secrets.toml
      # MSSQL_CONNECTION_STRING: "DRIVER={ODBC Driver 18 for SQL Server};SERVER=...; etc"
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount your secrets.toml at runtime (never bake credentials into image)
      - ./.streamlit:/app/.streamlit:ro
      # Optional: persist any future logs or exports
      - ./logs:/app/logs
    restart: unless-stopped
    # For production: add healthcheck, resource limits, network to internal segment only
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

# Quick start:
#   docker compose up --build
# Then browse http://localhost:8501
# For real MSSQL: put secrets.toml in .streamlit/ and set USE_MOCK_DEFAULT=False in app.py
